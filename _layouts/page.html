---
layout: default
---

<main id="main-content" class="site-main" tabindex="-1">
  <article class="page-shell{% if page.page_class %} {{ page.page_class }}{% endif %}">
    {% unless page.hide_title %}
      <header class="page-hero">
        {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
        <h1>{{ page.title }}</h1>
        {% if page.description %}<p class="page-hero__dek">{{ page.description }}</p>{% endif %}
      </header>
    {% endunless %}

    {{ content }}
  </article>
</main>
